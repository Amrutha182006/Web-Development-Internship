<!-- signup.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Dynasty | Signup</title>
    <link rel="icon" href="images/icon1.png" type="image/png">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">Emerald Dynasty</h2>
            <div class="nav-wrapper">
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="menu.html" class="nav-link">Menu</a></li>
                    <li><a href="about.html" class="nav-link">About Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- signup Section -->
    <section class="signup-page">

        <div class="signup-container">

            <h1 class="signup-title">Welcome!</h1>


            <form id="signup-form">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                </div>

                <button type="submit" class="signup-btn">
                    Signup
                </button>

            </form>


        </div>

    </section>

    <script src="js/signup.js"></script>
</body>

</html>
