<!-- login.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Dynasty | Login</title>
    <link rel="icon" href="images/icon1.png" type="image/png">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">Emerald Dynasty</h2>
            <div class="nav-wrapper">
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="menu.html" class="nav-link">Menu</a></li>
                    <li><a href="about.html" class="nav-link">About Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="login-page">

        <div class="login-container">

            <h1 class="login-title">Welcome Back !</h1>

            <p class="login-subtitle">
                Sign in to continue your royal dining experience
            </p>

            <form id="login-form">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <button type="submit" class="login-btn">
                    LOGIN
                </button>

            </form>

            <div class="extra-links">
                Don't have an account?
                <a href="signup.html">Create Account</a>
            </div>

        </div>

    </section>

    <script src="js/login.js"></script>
</body>

</html>
